name: Build
on:
  - push
  - pull_request
  - workflow_dispatch
jobs:
  build:
    name: Build
    runs-on: windows-2022
    steps:
      - name: Configure git
        run: git config --global core.autocrlf false
      - uses: actions/checkout@v7
      - name: Set up msys2
        uses: msys2/setup-msys2@v2
        with:
          install: make tar zip unzip mingw-w64-x86_64-gcc
          path-type: inherit
      - name: Build
        run: msys2 ./.github/workflows/build.sh
